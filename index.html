<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Savrin Portal | Unified Workforce Management</title>
    <meta name="title" content="Savrin Portal | Unified Workforce Management">
    <meta name="description" content="Savrin is the most intuitive HRMS platform designed to streamline your operations, monitor performance, and boost organizational productivity.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://savrin-portal.web.app/">
    <meta property="og:title" content="Savrin Portal | Unified Workforce Management">
    <meta property="og:description" content="Empower your team with real-time attendance, leave management, and project tracking.">
    <meta property="og:image" content="/assets/logo.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
      #loader-wrapper {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #ffffff; display: flex; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.5s ease;
      }
      .loader-content { text-align: center; }
      .loader-spinner {
        width: 40px; height: 40px; border: 4px solid #f3f3f3;
        border-top: 4px solid #38bdf8; border-radius: 50%;
        animation: spin 1s linear infinite; margin: 0 auto 15px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .loader-logo { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 20px; color: #0f172a; letter-spacing: -0.5px; }
    </style>
  </head>
  <body>
    <div id="loader-wrapper">
      <div class="loader-content">
        <div class="loader-spinner"></div>
        <div class="loader-logo">SAVRIN</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('loader-wrapper');
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }, 300);
      });
    </script>
  </body>
</html>
